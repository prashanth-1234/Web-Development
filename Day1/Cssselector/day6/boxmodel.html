<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simple ecommerce</title>
<style>
  body{
    background-color: white;
    margin: 0%;
    font-family: Arial, Helvetica, sans-serif;
  }
  header{
    background-color:black;
    color: white;
    padding: 15px;
    text-align: center;
    display: block;
    width: fit-content;
    margin: 0% auto;
  }
  .container{
    
    display: flex;
    justify-content: left;
    flex-wrap: wrap;
    margin: 20px;
    background-color: bisque;
    width: 800px;

  }
  .product{
    width: 200px;
    background-color: white;
    margin: 15px;
    padding: 15px;
    border: 4px solid black;
    text-align: center;
    box-sizing: border-box;
    border-radius: 10px;
  }
  .product img{
    width: 120px;
    height: 80px;
  }
  .product h3{
    margin: 10px 0 10 0;
  }
  .product button{
    background-color: green;
    columns: white ;
    padding: 10px;
    border: none;
    cursor: pointer;
  }
  .product button:hover{
    background-color: darkgreen;
  }

</style>
</head>


<body>
  <header>
    My ecommerce store
  </header>
  <div class="container">
    <div class="product">
      <img src="https://images.pexels.com/photos/13570143/pexels-photo-13570143.jpeg" alt="Iphone" width="100" height="100">
      <h3>Iphone</h3>
      <p>$500</p>
      <button>add to cart</button>
      
    </div>

  
<div class="product">
  <img src="https://images.pexels.com/photos/6372939/pexels-photo-6372939.jpeg" alt="laptop" width="150" height="150">
  <h3>Laptop</h3>
  <p>$1000</p>
  <button>add to cart</button>

</div>
<div class="product">
  <img src="https://images.pexels.com/photos/15102004/pexels-photo-15102004.jpeg" alt="book" width="150" height="150">
  <h3>Books</h3>
  <p>$800</p>
  <button>add to cart</button>

</div>
</div>
</body>
</html>
